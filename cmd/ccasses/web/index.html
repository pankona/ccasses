<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ccasses - Claude Code Assessment</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #333; }
    header { background: #1a1a2e; color: #eee; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p { font-size: 0.85rem; color: #aaa; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    /* Stats row */
    .stats-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-card { background: #fff; border-radius: 8px; padding: 1rem 1.5rem; flex: 1; min-width: 160px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .stat-card .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; margin-top: 0.25rem; }

    /* Charts row */
    .charts-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .chart-card { background: #fff; border-radius: 8px; padding: 1rem; flex: 1; min-width: 280px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .chart-card h3 { font-size: 0.85rem; color: #666; margin-bottom: 0.75rem; }
    .chart-card canvas { max-height: 220px; }

    /* Session table */
    .table-card { background: #fff; border-radius: 8px; padding: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow-x: auto; }
    .table-card h3 { font-size: 0.9rem; color: #444; margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid #eee;
      color: #666; font-size: 0.75rem; text-transform: uppercase; white-space: nowrap; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #f0f0f0; }
    tr:hover td { background: #f5f8ff; cursor: pointer; }
    .tag { display: inline-block; background: #e8eaf6; color: #3949ab; border-radius: 4px;
      padding: 0.1rem 0.4rem; font-size: 0.75rem; margin: 0.1rem; }
    .tag.haiku { background: #e8f5e9; color: #2e7d32; }
    .tag.sonnet { background: #fff8e1; color: #f57f17; }
    .tag.opus { background: #fce4ec; color: #c62828; }

    /* Detail view */
    .back-btn { background: none; border: 1px solid #aaa; border-radius: 6px;
      padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.85rem; margin-bottom: 1rem; color: #555; }
    .back-btn:hover { background: #eee; }
    .detail-header { background: #fff; border-radius: 8px; padding: 1rem 1.5rem; margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .detail-header h2 { font-size: 1.1rem; margin-bottom: 0.4rem; }
    .detail-header p { font-size: 0.8rem; color: #888; }
    .timeline-card { background: #fff; border-radius: 8px; padding: 1rem; margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .timeline-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .timeline-card-header h3 { font-size: 0.85rem; color: #666; }
    .timeline-card canvas { max-height: 300px; }
    .zoom-hint { font-size: 0.75rem; color: #aaa; }
    .reset-zoom-btn { background: none; border: 1px solid #ccc; border-radius: 4px;
      padding: 0.2rem 0.6rem; cursor: pointer; font-size: 0.75rem; color: #666; }
    .reset-zoom-btn:hover { background: #f0f0f0; }

    #loading { text-align: center; padding: 3rem; color: #888; }
    #error-msg { color: #c62828; padding: 1rem; }

    /* Collapsible tool tree */
    .tool-tree { list-style: none; padding: 0; font-size: 0.82rem; }
    .tool-tree .t-row { display: flex; align-items: center; padding: 0.3rem 0.5rem; gap: 0.3rem; cursor: default; border-bottom: 1px solid #f0f0f0; }
    .tool-tree .t-row.expandable { cursor: pointer; }
    .tool-tree .t-row.expandable:hover { background: #f5f8ff; }
    .tool-tree .t-toggle { width: 0.9rem; color: #888; font-size: 0.7rem; flex-shrink: 0; }
    .tool-tree .t-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tool-tree .t-bar-wrap { width: 80px; height: 6px; background: #eee; border-radius: 3px; flex-shrink: 0; }
    .tool-tree .t-bar { height: 100%; border-radius: 3px; background: #4e79a7; }
    .tool-tree .t-count { width: 3rem; text-align: right; color: #666; flex-shrink: 0; }
    .tool-tree .t-children { list-style: none; display: none; background: #fafafa; }
    .tool-tree .t-children .t-row { padding-left: 1.5rem; }
    .tool-tree .t-children .t-bar { background: #76b7b2; }
    .tool-tree .t-details { margin-left: 1.5rem; }
    .tool-tree .t-detail-row { padding-left: 0.5rem; }
    .tool-tree .t-detail { font-size: 0.85em; opacity: 0.8; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }

    #chart-point-tooltip {
      position: fixed; pointer-events: none; display: none;
      background: rgba(0,0,0,0.75); color: #fff;
      border-radius: 6px; padding: 0.4rem 0.7rem;
      font-size: 0.8rem; line-height: 1.5; z-index: 1000;
      max-width: 300px; white-space: pre-wrap; word-break: break-all;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>ccasses</h1>
      <p>Claude Code Session Assessment</p>
    </div>
  </header>

  <div id="chart-point-tooltip"></div>
  <div class="container">
    <div id="loading">Loading sessions...</div>
    <div id="error-msg" style="display:none"></div>

    <!-- Sessions overview -->
    <div id="view-sessions" style="display:none">
      <div class="stats-row" id="stats-row"></div>
      <div class="charts-row">
        <div class="chart-card">
          <h3>Tool Usage (All Sessions)</h3>
          <div id="chart-tools" style="max-height:220px;overflow-y:auto;"></div>
        </div>
        <div class="chart-card">
          <h3>Model Usage (All Sessions)</h3>
          <canvas id="chart-models"></canvas>
        </div>
      </div>
      <div class="table-card">
        <h3>Sessions</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Project</th><th>Branch</th><th>Start</th>
              <th>Duration</th><th>Turns</th><th>Output Tokens</th><th>Cache Read</th><th>Models</th>
            </tr>
          </thead>
          <tbody id="sessions-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Session detail -->
    <div id="view-detail" style="display:none">
      <button class="back-btn" onclick="showSessionsList()">← Back to Sessions</button>
      <div class="detail-header" id="detail-header"></div>
      <div class="stats-row" id="detail-stats-row"></div>
      <div class="charts-row">
        <div class="chart-card">
          <h3>Tool Usage</h3>
          <div id="detail-chart-tools" style="max-height:220px;overflow-y:auto;"></div>
        </div>
        <div class="chart-card">
          <h3>Model Usage (turns)</h3>
          <canvas id="detail-chart-models"></canvas>
        </div>
      </div>
      <div class="timeline-card">
        <div class="timeline-card-header">
          <h3>Context Size Over Time</h3>
          <div style="display:flex;align-items:center;gap:0.75rem">
            <span class="zoom-hint">ホイール: ズーム　ドラッグ: スクロール</span>
            <button class="reset-zoom-btn" onclick="resetTimelineZoom()">Reset Zoom</button>
          </div>
        </div>
        <canvas id="detail-chart-timeline"></canvas>
      </div>
    </div>
  </div>

  <script>
    let allSessions = [];
    let chartTools, chartModels;
    let detailChartTools, detailChartModels, detailChartTimeline, detailChartFill;
    const CONTEXT_WINDOW = 200000;

    const COLORS = ['#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f','#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac'];

    function fmt(n) { return Number(n).toLocaleString('ja-JP'); }
    function fmtDuration(ms) {
      if (!ms || ms < 0) return '-';
      const s = Math.round(ms / 1000);
      if (s < 60) return s + 's';
      const m = Math.round(s / 60);
      if (m < 60) return m + 'm';
      return Math.floor(m/60) + 'h' + (m%60) + 'm';
    }
    function modelTag(name) {
      let cls = 'tag';
      if (name.includes('haiku')) cls += ' haiku';
      else if (name.includes('sonnet')) cls += ' sonnet';
      else if (name.includes('opus')) cls += ' opus';
      return `<span class="${cls}">${modelShortName(name)}</span>`;
    }

    // ---- Load sessions ----
    async function init() {
      try {
        const res = await fetch('/api/sessions');
        allSessions = (await res.json()) || [];
        allSessions = allSessions.filter(s => s.assistantTurnCount > 0);
        allSessions.sort((a,b) => new Date(b.startTime) - new Date(a.startTime));
        document.getElementById('loading').style.display = 'none';
        // 初期表示: URL に #session/xxx があれば詳細画面を開く
        const hash = location.hash;
        const m = hash.match(/^#session\/(.+)$/);
        if (m) {
          await showDetail(m[1], false);
        } else {
          renderSessionsView();
        }
      } catch(e) {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('error-msg');
        el.style.display = '';
        el.textContent = 'Error loading sessions: ' + e;
      }
    }

    // ---- Sessions overview ----
    function renderSessionsView() {
      document.getElementById('view-sessions').style.display = '';

      const totalTokensOut = allSessions.reduce((s,x) => s + x.tokens.output, 0);
      const totalCacheRead = allSessions.reduce((s,x) => s + x.tokens.cacheRead, 0);
      const totalTurns = allSessions.reduce((s,x) => s + x.assistantTurnCount, 0);
      document.getElementById('stats-row').innerHTML = `
        <div class="stat-card"><div class="label">Sessions</div><div class="value">${allSessions.length}</div></div>
        <div class="stat-card"><div class="label">Total Turns</div><div class="value">${fmt(totalTurns)}</div></div>
        <div class="stat-card"><div class="label">Output Tokens</div><div class="value">${fmt(totalTokensOut)}</div></div>
        <div class="stat-card"><div class="label">Cache Read</div><div class="value">${fmt(totalCacheRead)}</div></div>
      `;

      const toolAgg = {};
      const toolDetailsAgg = {};
      const detailsCap = 200;
      allSessions.forEach(s => {
        Object.entries(s.tools||{}).forEach(([k,v]) => { toolAgg[k] = (toolAgg[k]||0)+v; });
        Object.entries(s.toolDetails||{}).forEach(([k,arr]) => {
          if (!toolDetailsAgg[k]) toolDetailsAgg[k] = [];
          if (toolDetailsAgg[k].length < detailsCap) {
            const remaining = detailsCap - toolDetailsAgg[k].length;
            toolDetailsAgg[k] = toolDetailsAgg[k].concat(arr.slice(0, remaining));
          }
        });
      });
      renderToolsChart('chart-tools', toolAgg, toolDetailsAgg);

      const modelAgg = {};
      allSessions.forEach(s => Object.entries(s.models||{}).forEach(([k,v]) => {
        if (k !== '<synthetic>') modelAgg[k] = (modelAgg[k]||0)+v;
      }));
      renderPieChart('chart-models', Object.entries(modelAgg), chartModels, c => chartModels = c);

      const tbody = document.getElementById('sessions-tbody');
      tbody.innerHTML = allSessions.map(s => {
        const dur = s.endTime && s.startTime ? fmtDuration(new Date(s.endTime) - new Date(s.startTime)) : '-';
        const start = s.startTime
          ? new Date(s.startTime).toLocaleString('ja-JP', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
          : '-';
        const models = Object.keys(s.models||{}).filter(m=>m!=='<synthetic>').map(modelTag).join('');
        const proj = s.project.split('/').slice(-2).join('/');
        return `<tr onclick="showDetail('${s.sessionId}')">
          <td><code>${s.sessionId.slice(0,8)}</code></td>
          <td title="${s.project}">${proj}</td>
          <td>${s.branch||'-'}</td>
          <td>${start}</td>
          <td>${dur}</td>
          <td>${fmt(s.assistantTurnCount)}</td>
          <td>${fmt(s.tokens.output)}</td>
          <td>${fmt(s.tokens.cacheRead)}</td>
          <td>${models}</td>
        </tr>`;
      }).join('');
    }

    // ---- Session detail ----
    async function showDetail(sessionId, pushState = true) {
      document.getElementById('view-sessions').style.display = 'none';
      document.getElementById('view-detail').style.display = '';
      if (pushState) history.pushState({ sessionId }, '', `#session/${sessionId}`);

      const session = allSessions.find(s => s.sessionId === sessionId);
      if (!session) return;

      const proj = session.project.split('/').slice(-2).join('/');
      const start = session.startTime ? new Date(session.startTime).toLocaleString('ja-JP') : '-';
      const end = session.endTime ? new Date(session.endTime).toLocaleString('ja-JP') : '-';
      document.getElementById('detail-header').innerHTML = `
        <h2>${proj} / ${session.branch||''}</h2>
        <p>${session.sessionId} &nbsp;|&nbsp; ${start} → ${end} &nbsp;|&nbsp; v${session.version||''}</p>
      `;

      const t = session.tokens;
      document.getElementById('detail-stats-row').innerHTML = `
        <div class="stat-card"><div class="label">Turns</div><div class="value">${fmt(session.assistantTurnCount)}</div></div>
        <div class="stat-card"><div class="label">User Prompts</div><div class="value">${fmt(session.userPromptCount)}</div></div>
        <div class="stat-card"><div class="label">Output Tokens</div><div class="value">${fmt(t.output)}</div></div>
        <div class="stat-card"><div class="label">Cache Read</div><div class="value">${fmt(t.cacheRead)}</div></div>
        <div class="stat-card"><div class="label">Cache Created</div><div class="value">${fmt(t.cacheCreation)}</div></div>
      `;

      renderToolsChart('detail-chart-tools', session.tools||{}, session.toolDetails||{});
      renderPieChart('detail-chart-models',
        Object.entries(session.models||{}).filter(([k])=>k!=='<synthetic>'),
        detailChartModels, c => detailChartModels = c);

      try {
        const res = await fetch(`/api/sessions/${sessionId}/timeline`);
        const data = await res.json();
        renderTimeline(data.timeline || [], data.subAgents || []);
      } catch(e) {
        console.error('timeline fetch error', e);
      }
    }

    function showSessionsList() {
      document.getElementById('view-detail').style.display = 'none';
      document.getElementById('view-sessions').style.display = '';
      history.pushState({}, '', '/');
    }

    // ブラウザバック/フォワード対応
    window.addEventListener('popstate', function(e) {
      if (e.state && e.state.sessionId) {
        showDetail(e.state.sessionId, false);
      } else {
        // ハッシュにセッションIDがあればそちらを優先
        const hash = location.hash;
        const m = hash.match(/^#session\/(.+)$/);
        if (m) {
          showDetail(m[1], false);
        } else {
          document.getElementById('view-detail').style.display = 'none';
          document.getElementById('view-sessions').style.display = '';
        }
      }
    });

    function fmtTime(ms) {
      const d = new Date(ms);
      const mo = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return mo+'/'+dd+' '+hh+':'+mm;
    }

    const GAP_THRESHOLD_MS = 60 * 60 * 1000; // 1時間以上の空白をギャップとみなす
    const COMPACTION_DROP_RATIO = 0.5;        // 50%以上の急落をcompactionとみなす

    function modelShortName(name) {
      return (name || '').replace('claude-', '').replace(/-\d{8}$/, '').replace(/-20\d+$/, '');
    }
    function modelBandColor(name) {
      if (name.includes('haiku'))  return { bg: 'rgba(46,125,50,0.10)',  label: '#2e7d32' };
      if (name.includes('sonnet')) return { bg: 'rgba(245,127,23,0.10)', label: '#b35f00' };
      if (name.includes('opus'))   return { bg: 'rgba(198,40,40,0.10)',  label: '#8b0000' };
      return { bg: 'rgba(128,128,128,0.08)', label: '#555' };
    }

    const TOOL_COLORS = {
      'Bash':  '#4e79a7', 'Skill': '#e15759', 'Agent': '#b07aa1',
      'Edit':  '#f28e2b', 'Write': '#f28e2b',
      'Read':  '#59a14f', 'Glob':  '#59a14f', 'Grep':  '#59a14f',
    };
    function toolEventColor(tools) {
      for (const t of tools) {
        const cat = t.split(':')[0];
        if (TOOL_COLORS[cat]) return TOOL_COLORS[cat];
      }
      return '#bab0ac';
    }

    const SUBAGENT_COLORS = {
      'general-purpose': '#7986cb',
      'Explore':         '#66bb6a',
      'Plan':            '#ffa726',
    };
    function subAgentColor(agentType) {
      return SUBAGENT_COLORS[agentType] || '#ba68c8';
    }

    function renderTimeline(entries, subAgents) {
      const assistantEntries = entries.filter(e => e.type === 'assistant' && e.tokens);
      if (assistantEntries.length === 0) return;

      const t0 = new Date(assistantEntries[0].timestamp).getTime();

      const fillPoints      = [];
      const compactionPoints  = [];
      const cacheResetPoints  = [];
      const toolEventPoints   = [];
      const toolEventColors   = [];
      const modelSegments     = [];

      // モデル切り替わりセグメントを構築
      {
        let segModel = assistantEntries[0].model || '';
        let segStart = new Date(assistantEntries[0].timestamp).getTime() - t0;
        for (let i = 1; i < assistantEntries.length; i++) {
          const model = assistantEntries[i].model || '';
          const xVal  = new Date(assistantEntries[i].timestamp).getTime() - t0;
          if (model !== segModel) {
            modelSegments.push({ model: segModel, xStart: segStart, xEnd: xVal });
            segModel = model;
            segStart = xVal;
          }
        }
        const lastX = new Date(assistantEntries[assistantEntries.length - 1].timestamp).getTime() - t0;
        modelSegments.push({ model: segModel, xStart: segStart, xEnd: lastX });
      }

      for (let i = 0; i < assistantEntries.length; i++) {
        const e = assistantEntries[i];
        const tsMs = new Date(e.timestamp).getTime();
        const xVal = tsMs - t0;
        const t = e.tokens;
        const total = t.input + t.cacheCreation + t.cacheRead;
        const fillVal = Math.min(100, total / CONTEXT_WINDOW * 100);

        if (i > 0) {
          const prevMs = new Date(assistantEntries[i-1].timestamp).getTime();
          if (tsMs - prevMs > GAP_THRESHOLD_MS) {
            fillPoints.push({ x: xVal, y: null });
          }
          const prevT = assistantEntries[i-1].tokens;
          const prevTotal = prevT.input + prevT.cacheCreation + prevT.cacheRead;
          const prevFill = Math.min(100, prevTotal / CONTEXT_WINDOW * 100);
          const prevModel = assistantEntries[i-1].model || '';
          const curModel  = e.model || '';
          if (prevT.cacheRead > 10000 && t.cacheRead < prevT.cacheRead * COMPACTION_DROP_RATIO) {
            if (prevFill - fillVal > 20) {
              compactionPoints.push({ x: xVal, y: fillVal, prevFill, ts: tsMs });
            } else {
              cacheResetPoints.push({ x: xVal, y: fillVal, prevFill, ts: tsMs,
                modelSwitch: prevModel !== curModel, prevModel, curModel });
            }
          }
        }

        const tools = e.tools || [];
        fillPoints.push({ x: xVal, y: fillVal, total, tools });
        if (tools.length > 0) {
          toolEventPoints.push({ x: xVal, y: fillVal, fill: fillVal, tools, ts: tsMs, model: e.model || '' });
          toolEventColors.push(toolEventColor(tools));
        }
      }

      const userEntries = entries.filter(e => e.type === 'user' && e.textLen > 0);
      const userPoints  = userEntries.map(e => ({
        x: new Date(e.timestamp).getTime() - t0,
        y: 0,
        promptText: e.text || '',
        ts: new Date(e.timestamp).getTime(),
      }));

      // SubAgent マーカー（開始時点にプロット）とバンド（期間）
      const subAgentPoints = (subAgents || []).map(sa => ({
        x: new Date(sa.startTime).getTime() - t0,
        y: 100,
        agentType: sa.agentType || 'general-purpose',
        prompt: sa.prompt || '',
        toolCount: sa.toolCount || 0,
        startTs: new Date(sa.startTime).getTime(),
        endTs:   new Date(sa.endTime).getTime(),
        xEnd: new Date(sa.endTime).getTime() - t0,
      }));
      const subAgentPointColors = subAgentPoints.map(p => subAgentColor(p.agentType));

      // SubAgent ツールイベント（サブエージェントのfill%折れ線上にプロット）
      const subAgentToolPoints  = [];
      const subAgentToolColors  = [];
      (subAgents || []).forEach(sa => {
        const col = subAgentColor(sa.agentType || 'general-purpose');
        const saTimeline = (sa.timeline || []).filter(e => e.type === 'assistant' && e.tokens);
        const fillData = saTimeline.map(e => {
          const t = e.tokens;
          const total = t.input + t.cacheCreation + t.cacheRead;
          return { ts: new Date(e.timestamp).getTime(), fill: Math.min(100, total / CONTEXT_WINDOW * 100) };
        });
        (sa.toolEvents || []).forEach(ev => {
          const evTs = new Date(ev.timestamp).getTime();
          let fillVal = 0;
          for (let i = fillData.length - 1; i >= 0; i--) {
            if (fillData[i].ts <= evTs) { fillVal = fillData[i].fill; break; }
          }
          subAgentToolPoints.push({
            x: evTs - t0,
            y: fillVal,
            tools: ev.tools || [],
            agentType: sa.agentType || 'general-purpose',
            ts: evTs,
          });
          subAgentToolColors.push(col);
        });
      });

      // SubAgent fill% 線グラフデータセットを構築
      const subAgentFillDatasets = [];
      (subAgents || []).forEach((sa, idx) => {
        const saTimeline = (sa.timeline || []).filter(e => e.type === 'assistant' && e.tokens);
        if (saTimeline.length === 0) return;

        const col = subAgentColor(sa.agentType || 'general-purpose');
        const points = saTimeline.map(e => {
          const t = e.tokens;
          const total = t.input + t.cacheCreation + t.cacheRead;
          const fillVal = Math.min(100, total / CONTEXT_WINDOW * 100);
          return { x: new Date(e.timestamp).getTime() - t0, y: fillVal, total };
        });

        subAgentFillDatasets.push({
          label: `${sa.agentType || 'agent'} #${idx + 1}`,
          data: points,
          yAxisID: 'yFill',
          pointRadius: 0,
          borderWidth: 1.2,
          borderColor: col,
          backgroundColor: col + '15',
          fill: false,
          spanGaps: false,
          borderDash: [4, 2],
          order: 3,
        });
      });

      if (detailChartTimeline) detailChartTimeline.destroy();
      if (detailChartFill) { detailChartFill.destroy(); detailChartFill = null; }

      const ctx = document.getElementById('detail-chart-timeline').getContext('2d');
      detailChartTimeline = new Chart(ctx, {
        type: 'line',
        data: {
          datasets: [
            {
              label: 'fill %', data: fillPoints, yAxisID: 'yFill',
              pointRadius: 0, borderWidth: 1.5, fill: true, spanGaps: false, order: 2,
              backgroundColor: 'rgba(89,161,79,0.1)',
              segment: {
                borderColor: ctx => {
                  const v = ctx.p1.parsed.y;
                  return v >= 80 ? '#e15759' : v >= 60 ? '#f28e2b' : '#59a14f';
                },
              },
            },
            {
              label: 'user prompt', data: userPoints, yAxisID: 'yFill',
              borderColor: 'transparent', pointBackgroundColor: '#e15759',
              pointRadius: 7, pointHoverRadius: 9, pointHitRadius: 10, pointStyle: 'triangle', showLine: false, order: 0,
            },
            {
              label: 'compaction', data: compactionPoints, yAxisID: 'yFill',
              borderColor: 'transparent', pointBackgroundColor: '#e15759',
              pointRadius: 8, pointHoverRadius: 10, pointHitRadius: 10, pointStyle: 'rectRot', showLine: false, order: 0,
            },
            {
              label: 'cache reset', data: cacheResetPoints, yAxisID: 'yFill',
              borderColor: 'transparent', pointBackgroundColor: '#aaaaaa',
              pointRadius: 6, pointHoverRadius: 8, pointHitRadius: 10, pointStyle: 'crossRot', showLine: false, order: 0,
            },
            {
              label: 'tool events', data: toolEventPoints, yAxisID: 'yFill',
              borderColor: 'transparent', pointBackgroundColor: toolEventColors,
              pointRadius: 3, pointHoverRadius: 6, pointHitRadius: 8, showLine: false, order: 1,
            },
            {
              label: 'subagent', data: subAgentPoints, yAxisID: 'yFill',
              borderColor: 'transparent', pointBackgroundColor: subAgentPointColors,
              pointRadius: 7, pointHoverRadius: 9, pointHitRadius: 10, pointStyle: 'star', showLine: false, order: 0,
            },
            {
              label: 'subagent tools', data: subAgentToolPoints, yAxisID: 'yFill',
              borderColor: subAgentToolColors, pointBackgroundColor: '#fff',
              borderWidth: 2,
              pointRadius: 4, pointHoverRadius: 6, pointHitRadius: 8, pointStyle: 'circle', showLine: false, order: 1,
            },
            ...subAgentFillDatasets,
          ]
        },
        options: {
          responsive: true,
          scales: {
            x: {
              type: 'linear',
              ticks: { maxTicksLimit: 8, callback: v => fmtTime(t0 + v) }
            },
            yFill: {
              type: 'linear', position: 'left', min: 0, max: 100,
              ticks: { callback: v => v + '%', stepSize: 25 },
              title: { display: true, text: 'context fill %', color: '#59a14f', font: { size: 11 } },
            },
          },
          plugins: {
            zoom: {
              zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' },
              pan: { enabled: true, mode: 'x' },
              limits: { x: { min: 'original', max: 'original' } },
            },
            legend: {
              display: true,
              labels: { font: { size: 11 } }
            },
            tooltip: { enabled: false }
          }
        },
        plugins: [{
          id: 'modelBands',
          beforeDatasetsDraw(chart) {
            const { ctx, chartArea, scales } = chart;
            if (!chartArea) return;
            ctx.save();
            ctx.beginPath();
            ctx.rect(chartArea.left, chartArea.top, chartArea.width, chartArea.height);
            ctx.clip();

            // モデル別背景バンド
            modelSegments.forEach(seg => {
              const xL = Math.max(chartArea.left,  scales.x.getPixelForValue(seg.xStart));
              const xR = Math.min(chartArea.right, scales.x.getPixelForValue(seg.xEnd));
              if (xR <= xL) return;
              const c = modelBandColor(seg.model);
              ctx.fillStyle = c.bg;
              ctx.fillRect(xL, chartArea.top, xR - xL, chartArea.height);
              const bw = xR - xL;
              if (bw > 30) {
                ctx.fillStyle = c.label;
                ctx.font = 'bold 9px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText(modelShortName(seg.model), (xL + xR) / 2, chartArea.top + 11);
              }
            });


            ctx.restore();
          }
        }]
      });
      setupTimelinePointTooltip();
    }

    let _timelineTooltipSetup = false;
    function setupTimelinePointTooltip() {
      if (_timelineTooltipSetup) return;
      _timelineTooltipSetup = true;

      const canvas = document.getElementById('detail-chart-timeline');
      const tip = document.getElementById('chart-point-tooltip');

      canvas.addEventListener('mousemove', function(evt) {
        const chart = detailChartTimeline;
        if (!chart) { tip.style.display = 'none'; return; }

        const elements = chart.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, false);
        const el = elements.find(e => {
          const label = chart.data.datasets[e.datasetIndex].label;
          return ['user prompt', 'compaction', 'cache reset', 'tool events', 'subagent', 'subagent tools'].includes(label);
        });
        if (!el) { tip.style.display = 'none'; return; }

        const ds = chart.data.datasets[el.datasetIndex];
        const point = ds.data[el.index];
        let lines = [];
        if (ds.label === 'user prompt') {
          lines = [fmtTime(point.ts), 'User prompt:', point.promptText || '(no text)'];
        } else if (ds.label === 'tool events') {
          lines = [fmtTime(point.ts), 'Model: ' + modelShortName(point.model),
            'fill: ' + (point.fill ?? 0).toFixed(1) + '%',
            'Tools: ' + (point.tools || []).join(', ')];
        } else if (ds.label === 'cache reset') {
          const reason = point.modelSwitch
            ? 'Model switch: ' + modelShortName(point.prevModel) + ' → ' + modelShortName(point.curModel)
            : 'Cache prefix invalidated';
          lines = ['Cache Reset', reason,
            'Before: ' + (point.prevFill ?? 0).toFixed(1) + '%',
            'After:  ' + (point.y ?? 0).toFixed(1) + '%'];
        } else if (ds.label === 'subagent tools') {
          lines = [
            fmtTime(point.ts) + ' [SubAgent: ' + (point.agentType || 'general-purpose') + ']',
            'Tools: ' + (point.tools || []).join(', '),
          ];
        } else if (ds.label === 'subagent') {
          const dur = fmtDuration(point.endTs - point.startTs);
          lines = [
            'SubAgent: ' + (point.agentType || 'general-purpose'),
            'Duration: ' + dur,
            'Tools: ' + point.toolCount,
            point.prompt ? 'Prompt: ' + point.prompt : '',
          ].filter(Boolean);
        } else {
          lines = ['Compaction', 'Before: ' + (point.prevFill ?? 0).toFixed(1) + '%', 'After: ' + (point.y ?? 0).toFixed(1) + '%'];
        }
        tip.textContent = lines.join('\n');
        tip.style.display = 'block';
        tip.style.left = (evt.clientX + 12) + 'px';
        tip.style.top  = (evt.clientY - 10) + 'px';
      });

      canvas.addEventListener('mouseleave', function() {
        tip.style.display = 'none';
      });
    }

    function resetTimelineZoom() {
      if (detailChartTimeline) detailChartTimeline.resetZoom();
    }

    // ---- Collapsible tool tree ----
    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addToggle(triggerRow, targetUl) {
      triggerRow.addEventListener('click', function(e) {
        e.stopPropagation();
        const open = targetUl.style.display === 'block';
        targetUl.style.display = open ? 'none' : 'block';
        triggerRow.querySelector('.t-toggle').textContent = open ? '▶' : '▼';
      });
    }

    function renderToolsChart(containerId, toolObj, toolDetails) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';

      // Group tools by prefix (Bash:*, Skill:*, Agent:* → parent:children)
      const groups = {};
      const singles = {};
      Object.entries(toolObj).forEach(([name, count]) => {
        const ci = name.indexOf(':');
        if (ci > 0) {
          const parent = name.slice(0, ci);
          const child  = name.slice(ci + 1);
          if (!groups[parent]) groups[parent] = { total: 0, children: {} };
          groups[parent].total += count;
          groups[parent].children[child] = (groups[parent].children[child] || 0) + count;
        } else {
          singles[name] = (singles[name] || 0) + count;
        }
      });

      const allItems = [];
      Object.entries(singles).forEach(([name, count]) => allItems.push({ name, count, children: null }));
      Object.entries(groups).forEach(([name, { total, children }]) => allItems.push({ name, count: total, children }));
      allItems.sort((a, b) => b.count - a.count);

      const maxCount = allItems[0]?.count || 1;
      const ul = document.createElement('ul');
      ul.className = 'tool-tree';

      allItems.forEach(({ name, count, children }) => {
        const hasChildren = children && Object.keys(children).length > 0;
        const li = document.createElement('li');

        const row = document.createElement('div');
        row.className = 't-row' + (hasChildren ? ' expandable' : '');
        row.innerHTML = `<span class="t-toggle">${hasChildren ? '▶' : ''}</span>` +
          `<span class="t-name">${escapeHtml(name)}</span>` +
          `<span class="t-bar-wrap"><span class="t-bar" style="width:${count/maxCount*100}%"></span></span>` +
          `<span class="t-count">${count}</span>`;
        li.appendChild(row);

        if (hasChildren) {
          const childUl = document.createElement('ul');
          childUl.className = 't-children';
          const childItems = Object.entries(children).sort((a, b) => b[1] - a[1]);
          const maxChild = childItems[0]?.[1] || 1;
          childItems.forEach(([cName, cCount]) => {
            const fullKey = name + ':' + cName;
            const details = (toolDetails || {})[fullKey] || [];
            const hasDetails = details.length > 0;
            const cLi = document.createElement('li');
            const cRow = document.createElement('div');
            cRow.className = 't-row' + (hasDetails ? ' expandable' : '');
            cRow.innerHTML =
              `<span class="t-toggle">${hasDetails ? '▶' : ''}</span>` +
              `<span class="t-name">${escapeHtml(cName)}</span>` +
              `<span class="t-bar-wrap"><span class="t-bar" style="width:${cCount/maxChild*100}%"></span></span>` +
              `<span class="t-count">${cCount}</span>`;
            cLi.appendChild(cRow);

            if (hasDetails) {
              const detailUl = document.createElement('ul');
              detailUl.className = 't-children t-details';
              details.forEach(d => {
                const dLi = document.createElement('li');
                dLi.innerHTML = `<div class="t-row t-detail-row">` +
                  `<span class="t-name t-detail">${escapeHtml(d)}</span></div>`;
                detailUl.appendChild(dLi);
              });
              cLi.appendChild(detailUl);
              addToggle(cRow, detailUl);
            }
            childUl.appendChild(cLi);
          });
          li.appendChild(childUl);

          addToggle(row, childUl);
        }
        ul.appendChild(li);
      });
      container.appendChild(ul);
    }

    // ---- Chart helpers ----
    function renderPieChart(id, entries, oldChart, setter) {
      if (oldChart) oldChart.destroy();
      const ctx = document.getElementById(id).getContext('2d');
      setter(new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: entries.map(([k]) => k.replace('claude-','').replace(/-20\d+$/,'')),
          datasets: [{ data: entries.map(([,v]) => v), backgroundColor: COLORS }]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } }
        }
      }));
    }

    init();
  </script>
</body>
